apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentcube-router
  namespace: agentcube
  labels:
    app.kubernetes.io/name: agentcube-router
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: agentcube
rules:
  # Secrets for session tokens and credentials
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  
  # ConfigMaps for configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  
  # Pods for health checks
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  
  # Events for monitoring
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  
  # Services for endpoint discovery
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  
  # Endpoints for service discovery
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
