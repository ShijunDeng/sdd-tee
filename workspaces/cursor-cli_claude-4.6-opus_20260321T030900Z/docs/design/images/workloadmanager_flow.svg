<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="system-ui,Segoe UI,sans-serif" font-size="12">
  <title>Workload Manager  create flow</title>
  <rect width="640" height="320" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="320" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">Workload Manager  sandbox create flow</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#334155"/>
    </marker>
  </defs>
  <!-- Steps as boxes -->
  <rect x="40" y="56" width="120" height="40" rx="5" fill="#fff" stroke="#0ea5e9"/>
  <text x="100" y="80" text-anchor="middle" fill="#0369a1">1. Watch CRD</text>
  <rect x="200" y="56" width="120" height="40" rx="5" fill="#fff" stroke="#0ea5e9"/>
  <text x="260" y="80" text-anchor="middle" fill="#0369a1">2. Validate spec</text>
  <rect x="360" y="56" width="120" height="40" rx="5" fill="#fff" stroke="#0ea5e9"/>
  <text x="420" y="80" text-anchor="middle" fill="#0369a1">3. Build PodSpec</text>
  <rect x="520" y="56" width="80" height="40" rx="5" fill="#fff" stroke="#0ea5e9"/>
  <text x="560" y="80" text-anchor="middle" fill="#0369a1">4. Apply</text>
  <path d="M160 76 L198 76" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M320 76 L358 76" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M480 76 L518 76" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Second row -->
  <rect x="120" y="140" width="140" height="44" rx="5" fill="#ecfdf5" stroke="#059669"/>
  <text x="190" y="168" text-anchor="middle" fill="#065f46">K8s: Pod created</text>
  <rect x="300" y="140" width="140" height="44" rx="5" fill="#ecfdf5" stroke="#059669"/>
  <text x="370" y="168" text-anchor="middle" fill="#065f46">Service / endpoints</text>
  <rect x="480" y="140" width="120" height="44" rx="5" fill="#ecfdf5" stroke="#059669"/>
  <text x="540" y="168" text-anchor="middle" fill="#065f46">Store session</text>
  <path d="M560 96 L540 140" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M420 96 L370 140" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M100 96 L190 140" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Router -->
  <rect x="200" y="220" width="240" height="48" rx="6" fill="#eff6ff" stroke="#2563eb"/>
  <text x="320" y="242" text-anchor="middle" font-weight="600" fill="#1e3a8a">Router ready to proxy</text>
  <text x="320" y="258" text-anchor="middle" font-size="11" fill="#1d4ed8">/v1/.../invocations/* ’ sandbox</text>
  <path d="M370 184 L320 220" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <path d="M540 184 L420 220" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="320" y="300" text-anchor="middle" font-size="11" fill="#475569">Controllers update status conditions; GC reclaims idle sandboxes.</text>
</svg>
