<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" font-family="system-ui,Segoe UI,sans-serif" font-size="13">
  <title>AgentCube architecture</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#334155"/>
    </marker>
    <marker id="m2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="720" height="200" fill="url(#bg)" stroke="#94a3b8"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">AgentCube  high-level architecture</text>
  <!-- Clients -->
  <rect x="24" y="60" width="100" height="48" rx="6" fill="#fff" stroke="#334155"/>
  <text x="74" y="90" text-anchor="middle" fill="#0f172a">Clients</text>
  <text x="74" y="106" text-anchor="middle" font-size="11" fill="#64748b">SDK / HTTP</text>
  <!-- Router -->
  <rect x="160" y="56" width="120" height="56" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="220" y="82" text-anchor="middle" font-weight="600" fill="#1e3a8a">Router</text>
  <text x="220" y="100" text-anchor="middle" font-size="11" fill="#1e40af">JWT, sessions</text>
  <!-- WM -->
  <rect x="320" y="56" width="150" height="56" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="395" y="82" text-anchor="middle" font-weight="600" fill="#14532d">Workload Mgr</text>
  <text x="395" y="100" text-anchor="middle" font-size="11" fill="#166534">reconcile CRDs</text>
  <!-- K8s API -->
  <rect x="510" y="56" width="100" height="56" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="560" y="82" text-anchor="middle" font-weight="600" fill="#78350f">K8s API</text>
  <text x="560" y="100" text-anchor="middle" font-size="11" fill="#92400e">Pods / Svc</text>
  <!-- Sandboxes -->
  <rect x="630" y="56" width="66" height="56" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="663" y="88" text-anchor="middle" font-size="11" fill="#4c1d95">Sand&#xAD;boxes</text>
  <!-- Arrows top row -->
  <path d="M124 84 L158 84" stroke="#334155" stroke-width="2" marker-end="url(#m)"/>
  <path d="M280 84 L318 84" stroke="#334155" stroke-width="2" marker-end="url(#m)"/>
  <path d="M470 84 L508 84" stroke="#334155" stroke-width="2" marker-end="url(#m)"/>
  <path d="M610 84 L628 84" stroke="#334155" stroke-width="2" marker-end="url(#m)"/>
  <!-- Redis -->
  <rect x="200" y="132" width="110" height="44" rx="6" fill="#fff1f2" stroke="#e11d48"/>
  <text x="255" y="158" text-anchor="middle" font-weight="600" fill="#881337">Redis / Valkey</text>
  <path d="M220 112 L255 132" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#m2)"/>
  <path d="M395 112 L270 132" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#m2)"/>
  <!-- Legend note -->
  <text x="360" y="188" text-anchor="middle" font-size="11" fill="#475569">Solid: request path · Dashed: session / coordination store</text>
</svg>
