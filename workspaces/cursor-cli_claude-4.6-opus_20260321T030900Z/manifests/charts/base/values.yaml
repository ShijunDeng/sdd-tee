# Default values for agentcube.
# This is a YAML-formatted file.

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

redis:
  # REDIS_ADDR for router and workloadmanager (e.g. redis-master.default.svc.cluster.local:6379)
  addr: ""
  # Plaintext password; prefer mounting via extraEnv from a Secret in production.
  password: ""

router:
  replicas: 1
  image: ghcr.io/volcano-sh/agentcube-router:latest
  imagePullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: "1"
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  extraEnv: []
  # If empty, the pod uses the namespace default ServiceAccount.
  serviceAccountName: ""
  rbac:
    create: false

workloadmanager:
  replicas: 1
  image: ghcr.io/volcano-sh/workloadmanager:latest
  imagePullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  port: 8080
  runtimeClassName: ""
  resources:
    limits:
      cpu: "1"
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  extraEnv: []

volcano:
  scheduler:
    enabled: false
    replicas: 1
    image: ghcr.io/volcano-sh/vc-agent-scheduler:latest
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        cpu: "2"
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 256Mi
