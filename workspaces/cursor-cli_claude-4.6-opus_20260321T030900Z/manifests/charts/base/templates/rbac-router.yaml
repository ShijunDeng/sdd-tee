{{- if .Values.router.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agentcube.router.serviceAccountName" . }}
  labels:
    app.kubernetes.io/name: {{ include "agentcube.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: router
    app.kubernetes.io/managed-by: {{ .Release.Service }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agentcube.router.serviceAccountName" . }}-secrets
  labels:
    app.kubernetes.io/name: {{ include "agentcube.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: router
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agentcube.router.serviceAccountName" . }}-secrets
  labels:
    app.kubernetes.io/name: {{ include "agentcube.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: router
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agentcube.router.serviceAccountName" . }}-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "agentcube.router.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
