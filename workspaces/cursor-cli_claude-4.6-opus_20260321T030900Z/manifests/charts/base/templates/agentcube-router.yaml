apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentcube.router.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "agentcube.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: router
    {{- with .Chart.AppVersion }}
    app.kubernetes.io/version: {{ quote . }}
    {{- end }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: {{ .Values.router.service.type }}
  ports:
    - name: http
      port: {{ .Values.router.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "agentcube.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: router
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentcube.router.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "agentcube.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: router
    {{- with .Chart.AppVersion }}
    app.kubernetes.io/version: {{ quote . }}
    {{- end }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.router.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agentcube.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "agentcube.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: router
    spec:
      {{- include "agentcube.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.router.serviceAccountName }}
      serviceAccountName: {{ .Values.router.serviceAccountName | quote }}
      {{- else if .Values.router.rbac.create }}
      serviceAccountName: {{ include "agentcube.router.serviceAccountName" . }}
      {{- end }}
      containers:
        - name: router
          image: {{ .Values.router.image | quote }}
          imagePullPolicy: {{ .Values.router.imagePullPolicy }}
          args:
            - --port={{ .Values.router.service.port | toString }}
          ports:
            - name: http
              containerPort: {{ .Values.router.service.port }}
              protocol: TCP
          env:
            - name: AGENTCUBE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDIS_ADDR
              value: {{ .Values.redis.addr | quote }}
            - name: REDIS_PASSWORD
              value: {{ .Values.redis.password | quote }}
            - name: WORKLOAD_MANAGER_URL
              value: {{ printf "http://%s.%s.svc.cluster.local:%v" (include "agentcube.workloadmanager.name" .) .Release.Namespace .Values.workloadmanager.service.port | quote }}
            {{- with .Values.router.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.router.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
