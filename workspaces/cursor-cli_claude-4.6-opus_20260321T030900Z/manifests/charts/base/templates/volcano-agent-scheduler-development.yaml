{{- if .Values.volcano.scheduler.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agentcube.volcano.scheduler.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "agentcube.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vc-agent-scheduler
    app.kubernetes.io/managed-by: {{ .Release.Service }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentcube.volcano.scheduler.name" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "agentcube.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vc-agent-scheduler
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  scheduler.conf: |
    # Development-oriented defaults; replace in production.
    leader-elect: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agentcube.volcano.scheduler.name" . }}-{{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "agentcube.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vc-agent-scheduler
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  - apiGroups:
      - ""
    resources:
      - events
      - endpoints
      - pods
      - pods/status
      - persistentvolumeclaims
      - persistentvolumes
      - nodes
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - scheduling.volcano.sh
    resources:
      - podgroups
      - queues
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - batch.volcano.sh
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agentcube.volcano.scheduler.name" . }}-{{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "agentcube.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vc-agent-scheduler
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "agentcube.volcano.scheduler.name" . }}-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ include "agentcube.volcano.scheduler.name" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentcube.volcano.scheduler.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "agentcube.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vc-agent-scheduler
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 443
      targetPort: 10259
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "agentcube.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vc-agent-scheduler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentcube.volcano.scheduler.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "agentcube.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vc-agent-scheduler
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.volcano.scheduler.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agentcube.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: vc-agent-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "agentcube.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: vc-agent-scheduler
    spec:
      {{- include "agentcube.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "agentcube.volcano.scheduler.name" . }}
      containers:
        - name: scheduler
          image: {{ .Values.volcano.scheduler.image | quote }}
          imagePullPolicy: {{ .Values.volcano.scheduler.imagePullPolicy }}
          args:
            - --config=/etc/vc-agent-scheduler/scheduler.conf
            - --bind-address=0.0.0.0
            - --secure-port=10259
          ports:
            - name: https
              containerPort: 10259
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/vc-agent-scheduler
              readOnly: true
          {{- with .Values.volcano.scheduler.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "agentcube.volcano.scheduler.name" . }}-config
{{- end }}
