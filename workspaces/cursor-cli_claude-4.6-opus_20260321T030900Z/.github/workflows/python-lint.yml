name: Python lint

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - "sdk-python/**"
      - "cmd/cli/**/*.py"
      - ".github/workflows/python-lint.yml"

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ruff
        run: |
          pip install ruff
          ruff check sdk-python cmd/cli || true
          ruff format --check sdk-python cmd/cli || true
