name: Publish Dify plugin

on:
  push:
    tags:
      - "dify-plugin/v*"

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin directory
        id: check
        run: |
          if [ -d dify-plugin ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin bundle
        if: steps.check.outputs.present == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#dify-plugin/}"
          mkdir -p dist
          (cd dify-plugin && zip -r "../dist/agentcube-dify-plugin-${VERSION}.zip" . -x "*.git*")

      - name: Upload artifact
        if: steps.check.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dify-plugin-${{ github.ref_name }}
          path: dist/*.zip

      - name: Skip notice
        if: steps.check.outputs.present != 'true'
        run: |
          echo "No dify-plugin/ directory in this repo; add plugin assets under dify-plugin/ to produce a zip artifact."
