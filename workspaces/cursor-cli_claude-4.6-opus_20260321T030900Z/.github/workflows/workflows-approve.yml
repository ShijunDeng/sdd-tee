name: Auto-approve trusted contributors

# Approves selected bot PRs so Actions can run without manual clicks when branch protection
# requires reviews. Extend the actor list for org-maintainer bot accounts.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    if: >-
      contains(fromJSON('["dependabot[bot]","renovate[bot]"]'), github.actor)
    runs-on: ubuntu-latest
    steps:
      - uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
