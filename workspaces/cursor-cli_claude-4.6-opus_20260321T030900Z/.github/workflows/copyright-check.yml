name: Copyright headers

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Go API packages
        run: |
          set -e
          missing=0
          while IFS= read -r -d '' f; do
            if ! head -12 "$f" | grep -q "Copyright"; then
              echo "Missing copyright: $f"
              missing=1
            fi
          done < <(find ./pkg/apis -name '*.go' ! -name 'zz_generated*.go' -print0 2>/dev/null)
          exit "$missing"
