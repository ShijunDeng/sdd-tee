credentials_for_provider:
  control_plane_url:
    type: text-input
    required: true
    label:
      en_US: Control plane URL
    placeholder:
      en_US: https://router.agentcube.svc.cluster.local
    help:
      en_US: Base URL for the AgentCube router / control plane (same host used by the Python SDK).
  namespace:
    type: text-input
    required: true
    label:
      en_US: Kubernetes namespace
    placeholder:
      en_US: default
    help:
      en_US: Namespace where CodeInterpreter sessions are created.
  api_key:
    type: secret-input
    required: false
    label:
      en_US: Bearer token (optional)
    help:
      en_US: Optional JWT or API token sent as Authorization Bearer.

extra:
  python:
    source: provider/agentcube.py

identity:
  author: volcano-sh
  description:
    en_US: Connect Dify to AgentCube managed code interpreter sandboxes.
  icon: icon.svg
  label:
    en_US: AgentCube
  name: agentcube
  tags:
    - agentcube
    - code-interpreter

tools:
  - tools/agentcube-code-interpreter.yaml
