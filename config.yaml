# SDD-TEE (SDD Token Efficiency Evaluation) Configuration v2
# CodeSpec 7-Stage × OpenSpec OPSX

project:
  name: agentcube
  repo_url: https://github.com/ShijunDeng/agentcube.git
  deepwiki_url: https://deepwiki.com/ShijunDeng/agentcube

methodology:
  framework: CodeSpec 7-Stage Workflow
  toolchain: OpenSpec OPSX
  ar_granularity: capability/feature level
  stages:
    - {id: ST-0, name: AR 输入, opsx: "/opsx:new", artifact: "变更目录"}
    - {id: ST-1, name: 需求澄清, opsx: "/opsx:ff → proposal", artifact: "proposal.md"}
    - {id: ST-2, name: Spec 增量设计, opsx: "/opsx:ff → specs", artifact: "delta-spec.md"}
    - {id: ST-3, name: Design 增量设计, opsx: "/opsx:ff → design", artifact: "design.md"}
    - {id: ST-4, name: 任务拆解, opsx: "/opsx:ff → tasks", artifact: "tasks.md"}
    - {id: ST-5, name: 开发实现, opsx: "/opsx:apply", artifact: "代码文件"}
    - {id: ST-6, name: 一致性验证, opsx: "/opsx:verify", artifact: "验证报告"}
    - {id: ST-7, name: 合并归档, opsx: "/opsx:archive", artifact: "归档 + spec 合并"}

metrics:
  stage: [ST-0, ST-1, ST-2, ST-3, ST-4, ST-5, ST-6, ST-7]
  role: [RT-AI, RT-HUMAN, RT-SPEC, RT-RATIO, RT-ITER]
  efficiency: [ET-LOC, ET-FILE, ET-TASK, ET-AR, ET-TIME, ET-COST-LOC]
  quality: [QT-COV, QT-CONSIST, QT-AVAIL, QT-BUG]
  distribution: [PT-DESIGN, PT-PLAN, PT-DEV, PT-VERIFY, PT-PEAK, PT-CACHE]

tools:
  - name: cursor-cli
    type: cli
    command: "cursor agent"
    non_interactive_flag: null  # Cursor agent accepts prompt as positional arg
    auto_accept_flag: null
    output_format: text
    token_tracking: limited
    proxy_env: {}  # Cursor uses its own backend, no proxy routing possible
    notes: "Uses 'cursor agent \"prompt\"'. No native token reporting."

  - name: claude-code
    type: cli
    command: claude
    non_interactive_flag: "--print"
    auto_accept_flag: "--dangerously-skip-permissions"
    output_format: "--output-format json"
    token_tracking: native  # Returns usage JSON with input/output/cache tokens
    proxy_env:
      ANTHROPIC_BASE_URL: "http://localhost:${PROXY_PORT}/v1"
    notes: "Full token telemetry via --output-format json. Proxy via ANTHROPIC_BASE_URL."

  - name: gemini-cli
    type: cli
    command: gemini
    non_interactive_flag: "--prompt"
    auto_accept_flag: "--yolo"
    output_format: "--output-format json"
    token_tracking: native
    proxy_env: {}  # Gemini CLI uses Google OAuth, not standard API key routing
    notes: "Uses 'gemini -p \"prompt\" -y -o json'. Token data from JSON output."

  - name: opencode-cli
    type: cli
    command: opencode
    non_interactive_flag: "run"
    auto_accept_flag: null
    output_format: null
    token_tracking: native  # opencode stats provides token/cost data
    proxy_env: {}  # OpenCode has its own provider system
    notes: "Uses 'opencode run \"prompt\"'. Token data via 'opencode stats'."

models:
  - {id: claude-4.6-opus-high-thinking, provider: anthropic, name: Claude 4.6 Opus (High Thinking)}
  - {id: claude-sonnet-4-20250514, provider: anthropic, name: Claude Sonnet 4}
  - {id: claude-opus-4-20250514, provider: anthropic, name: Claude Opus 4}
  - {id: gemini-2.5-pro, provider: google, name: Gemini 2.5 Pro}
  - {id: gpt-4.1, provider: openai, name: GPT-4.1}
  - {id: bailian-coding-plan/glm-5, provider: zhipu, name: GLM-5}

spec_context:
  format: OpenSpec (capability-based)
  directory: specs/
  capabilities:
    - sandbox-orchestration
    - session-routing
    - code-execution
    - session-store
    - idle-cleanup
    - cli-toolkit
    - python-sdk
    - deployment
    - ci-cd
    - integrations
  files_per_capability: [spec.md, design.md]
  total_requirements: 117
  total_scenarios: 172
  treatment: "计入 input tokens，标注为'预制规范'，单独统计"
  not_counted_as: RT-HUMAN

warnings:
  stage_budget_yellow: 1.5   # 单阶段 Token > 基线 150%
  total_budget_red: 1.2      # 总 Token > 预算 120%
  et_loc_anomaly: 2.0        # Token/LOC > 基线 200%
  usability_floor: 0.75      # 代码可用率 < 75%

litellm_proxy:
  enabled: true
  port: 4000
  log_format: json
  db_path: ./results/litellm_usage.db

output:
  runs_dir: ./results/runs
  reports_dir: ./results/reports
